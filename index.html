<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forest Memory — 森の神経衰弱</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #1a3a1a;
      --green-mid: #2d5a2d;
      --green-light: #3B6D11;
      --green-pale: #EAF3DE;
      --green-accent: #97C459;
      --cream: #f5f0e8;
      --text-dark: #1a2a1a;
      --text-mid: #4a6a4a;
      --card-back: #2d5a2d;
      --card-matched: #c8e6a0;
    }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--green-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(61,110,20,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(20,60,20,0.4) 0%, transparent 50%);
      pointer-events: none;
    }

    .leaves {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .leaf {
      position: absolute;
      font-size: 1.4rem;
      opacity: 0.12;
      animation: drift linear infinite;
    }

    @keyframes drift {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.12; }
      90%  { opacity: 0.12; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .title-jp {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: var(--green-accent);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .title-en {
      font-size: 2rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.05em;
    }

    .stats {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(151,196,89,0.3);
      border-radius: 12px;
      padding: 0.5rem 1.2rem;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: var(--green-accent);
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--cream);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 1.2rem;
    }

    .card {
      aspect-ratio: 1;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card:hover:not(.matched) .card-back {
      background: #3a7020;
      transform: scale(1.03);
    }

    .card.flipped,
    .card.matched {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transition: background 0.2s;
    }

    .card-back {
      background: var(--card-back);
      border: 0.5px solid rgba(151,196,89,0.25);
      font-size: 1.3rem;
    }

    .card-back-icon {
      font-size: 1.4rem;
      opacity: 0.7;
    }

    .card-front {
      background: var(--cream);
      border: 0.5px solid rgba(61,110,20,0.2);
      transform: rotateY(180deg);
      font-size: 2.2rem;
    }

    .card.matched .card-front {
      background: var(--card-matched);
      border-color: var(--green-accent);
    }

    .card.matched {
      cursor: default;
      animation: matchPop 0.35s ease;
    }

    @keyframes matchPop {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.1); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .msg {
      text-align: center;
      font-size: 0.9rem;
      color: var(--green-accent);
      letter-spacing: 0.05em;
      min-height: 1.4rem;
      margin-bottom: 1rem;
    }

    .btn-reset {
      display: block;
      margin: 0 auto;
      background: transparent;
      border: 0.5px solid rgba(151,196,89,0.5);
      border-radius: 10px;
      padding: 0.55rem 2rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--green-accent);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-reset:hover {
      background: rgba(151,196,89,0.12);
      color: var(--cream);
    }

    .clear-banner {
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    .clear-banner .emoji { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
    .clear-banner h2 { font-size: 1.4rem; color: var(--cream); margin-bottom: 0.3rem; }
    .clear-banner p { font-size: 0.9rem; color: var(--green-accent); margin-bottom: 1.2rem; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 400px) {
      .card-front { font-size: 1.6rem; }
      .grid { gap: 7px; }
    }
  </style>
</head>
<body>

<div class="leaves" id="leaves"></div>

<div class="container">
  <header>
    <div class="title-jp">森の神経衰弱</div>
    <div class="title-en">Forest Memory</div>
  </header>

  <div class="stats">
    <div class="stat">
      <span class="stat-label">めくった回数</span>
      <span class="stat-value" id="moves">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">ペア</span>
      <span class="stat-value" id="pairs">0 / 8</span>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="msg" id="msg"></div>
  <button class="btn-reset" onclick="initGame()">リセット</button>
</div>

<script>
  const EMOJIS = ['🌲','🌿','🍄','🦔','🌸','🦋','🍃','🌾'];
  let state = {};

  function shuffle(arr) {
    const a = [...arr, ...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function initGame() {
    state = { cards: shuffle(EMOJIS), flipped: [], matched_ids: [], matched: 0, moves: 0, locked: false };
    document.getElementById('moves').textContent = '0';
    document.getElementById('pairs').textContent = '0 / 8';
    document.getElementById('msg').textContent = '';
    render();
  }

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    state.cards.forEach((icon, i) => {
      const isMatched = state.matched_ids.includes(i);
      const isFlipped = state.flipped.includes(i);
      const card = document.createElement('div');
      card.className = 'card' + (isFlipped || isMatched ? ' flipped' : '') + (isMatched ? ' matched' : '');
      card.innerHTML = `
        <div class="card-face card-back"><span class="card-back-icon">🌲</span></div>
        <div class="card-face card-front">${icon}</div>`;
      if (!isMatched) card.onclick = () => flip(i);
      grid.appendChild(card);
    });
  }

  function flip(i) {
    if (state.locked || state.flipped.includes(i) || state.matched_ids.includes(i) || state.flipped.length === 2) return;
    state.flipped.push(i);
    render();
    if (state.flipped.length === 2) {
      state.moves++;
      document.getElementById('moves').textContent = state.moves;
      state.locked = true;
      const [a, b] = state.flipped;
      if (state.cards[a] === state.cards[b]) {
        state.matched_ids = [...state.matched_ids, a, b];
        state.matched++;
        document.getElementById('pairs').textContent = state.matched + ' / 8';
        state.flipped = [];
        state.locked = false;
        document.getElementById('msg').textContent = '✨ ペア発見！';
        render();
        if (state.matched === 8) {
          setTimeout(() => {
            document.getElementById('msg').innerHTML = `🎉 クリア！ ${state.moves} 回でコンプリート！`;
          }, 400);
        }
      } else {
        document.getElementById('msg').textContent = '';
        setTimeout(() => {
          state.flipped = [];
          state.locked = false;
          render();
        }, 900);
      }
    }
  }

  function createLeaves() {
    const container = document.getElementById('leaves');
    const icons = ['🍃','🌿','🍀','🌱'];
    for (let i = 0; i < 18; i++) {
      const leaf = document.createElement('div');
      leaf.className = 'leaf';
      leaf.textContent = icons[Math.floor(Math.random() * icons.length)];
      leaf.style.left = Math.random() * 100 + '%';
      leaf.style.animationDuration = (12 + Math.random() * 18) + 's';
      leaf.style.animationDelay = (Math.random() * 20) + 's';
      leaf.style.fontSize = (0.9 + Math.random() * 0.8) + 'rem';
      container.appendChild(leaf);
    }
  }

  createLeaves();
  initGame();
</script>
</body>
</html>
