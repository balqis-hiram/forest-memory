<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forest Memory — 森の神経衰弱</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #1a3a1a;
      --green-accent: #97C459;
      --cream: #f5f0e8;
      --card-back: #2d5a2d;
      --card-matched: #c8e6a0;
    }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--green-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(61,110,20,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(20,60,20,0.4) 0%, transparent 50%);
      pointer-events: none;
    }

    .leaves { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .leaf { position: absolute; opacity: 0.12; animation: drift linear infinite; }

    @keyframes drift {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.12; }
      90%  { opacity: 0.12; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .screen { display: none; position: relative; z-index: 1; width: 100%; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    /* タイトル画面 */
    #title-screen { max-width: 400px; text-align: center; }
    .title-jp { font-size: 0.85rem; letter-spacing: 0.25em; color: var(--green-accent); margin-bottom: 0.3rem; }
    .title-en { font-size: 2.4rem; font-weight: 700; color: var(--cream); letter-spacing: 0.05em; margin-bottom: 2.5rem; }
    .difficulty-label { font-size: 0.8rem; letter-spacing: 0.15em; color: var(--green-accent); margin-bottom: 1rem; }

    .difficulty-cards { display: flex; flex-direction: column; gap: 10px; width: 100%; }

    .diff-btn {
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(151,196,89,0.3);
      border-radius: 14px;
      padding: 1rem 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      color: var(--cream);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      text-align: left;
    }
    .diff-btn:hover { background: rgba(151,196,89,0.1); border-color: rgba(151,196,89,0.6); transform: translateX(4px); }
    .diff-btn:active { transform: translateX(4px) scale(0.98); }
    .diff-name { font-size: 1rem; font-weight: 700; display: block; margin-bottom: 2px; }
    .diff-desc { font-size: 0.78rem; color: rgba(245,240,232,0.55); }
    .diff-badge { font-size: 0.75rem; font-weight: 500; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .badge-easy   { background: rgba(151,196,89,0.18); color: #97C459; }
    .badge-normal { background: rgba(240,200,80,0.18);  color: #e8c040; }
    .badge-hard   { background: rgba(220,90,60,0.18);   color: #e06040; }

    /* ゲーム画面 */
    #game-screen { max-width: 560px; width: 100%; }

    .game-header { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 1.2rem; }
    .back-btn {
      background: transparent;
      border: 0.5px solid rgba(151,196,89,0.3);
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      color: var(--green-accent);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(151,196,89,0.1); }
    .game-title { font-size: 1rem; font-weight: 700; color: var(--cream); }
    .diff-tag { font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; }

    .stats { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.2rem; width: 100%; }
    .stat { background: rgba(255,255,255,0.07); border: 0.5px solid rgba(151,196,89,0.3); border-radius: 12px; padding: 0.5rem 1.2rem; text-align: center; flex: 1; }
    .stat-label { font-size: 11px; color: var(--green-accent); letter-spacing: 0.1em; display: block; margin-bottom: 2px; }
    .stat-value { font-size: 1.3rem; font-weight: 700; color: var(--cream); }

    .grid { display: grid; gap: 8px; width: 100%; margin-bottom: 1rem; }

    .card { aspect-ratio: 1; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.42s cubic-bezier(0.4,0,0.2,1); }
    .card:hover:not(.matched) .card-back { background: #3a7020; }
    .card.flipped, .card.matched { transform: rotateY(180deg); }
    .card-face { position: absolute; inset: 0; border-radius: 12px; display: flex; align-items: center; justify-content: center; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .card-back { background: var(--card-back); border: 0.5px solid rgba(151,196,89,0.25); transition: background 0.2s; }
    .card-back-icon { opacity: 0.7; }
    .card-front { background: var(--cream); border: 0.5px solid rgba(61,110,20,0.2); transform: rotateY(180deg); }
    .card.matched .card-front { background: var(--card-matched); border-color: var(--green-accent); }
    .card.matched { cursor: default; animation: matchPop 0.35s ease; }

    @keyframes matchPop {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.08); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .msg { text-align: center; font-size: 0.9rem; color: var(--green-accent); min-height: 1.4rem; margin-bottom: 0.8rem; width: 100%; }

    .btn-reset {
      display: block; margin: 0 auto;
      background: transparent;
      border: 0.5px solid rgba(151,196,89,0.5);
      border-radius: 10px;
      padding: 0.55rem 2rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.1em;
      color: var(--green-accent); cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-reset:hover { background: rgba(151,196,89,0.12); color: var(--cream); }
  </style>
</head>
<body>

<div class="leaves" id="leaves"></div>

<!-- タイトル画面 -->
<div class="screen active" id="title-screen">
  <div class="title-jp">森の神経衰弱</div>
  <div class="title-en">Forest Memory</div>
  <div class="difficulty-label">難易度を選んでください</div>
  <div class="difficulty-cards">
    <button class="diff-btn" onclick="startGame(8,'easy')">
      <div>
        <span class="diff-name">🌱 やさしい</span>
        <span class="diff-desc">4×4グリッド ／ 8ペア</span>
      </div>
      <span class="diff-badge badge-easy">EASY</span>
    </button>
    <button class="diff-btn" onclick="startGame(12,'normal')">
      <div>
        <span class="diff-name">🌿 ふつう</span>
        <span class="diff-desc">6×4グリッド ／ 12ペア</span>
      </div>
      <span class="diff-badge badge-normal">NORMAL</span>
    </button>
    <button class="diff-btn" onclick="startGame(16,'hard')">
      <div>
        <span class="diff-name">🌲 むずかしい</span>
        <span class="diff-desc">8×4グリッド ／ 16ペア</span>
      </div>
      <span class="diff-badge badge-hard">HARD</span>
    </button>
  </div>
</div>

<!-- ゲーム画面 -->
<div class="screen" id="game-screen">
  <div class="game-header">
    <button class="back-btn" onclick="goTitle()">← もどる</button>
    <div class="game-title">Forest Memory</div>
    <span class="diff-tag" id="diff-tag"></span>
  </div>
  <div class="stats">
    <div class="stat"><span class="stat-label">めくった回数</span><span class="stat-value" id="moves">0</span></div>
    <div class="stat"><span class="stat-label">ペア</span><span class="stat-value" id="pairs">0 / 0</span></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="msg" id="msg"></div>
  <button class="btn-reset" onclick="initGame()">リセット</button>
</div>

<script>
  const ALL_EMOJIS = ['🌲','🌿','🍄','🦔','🌸','🦋','🍃','🌾','🐿','🦉','🌼','🍂','🐸','🌺','🐝','🦌'];

  const DIFF_META = {
    easy:   { label:'EASY',   cls:'badge-easy',   cols:4, fs:'1.8rem', bs:'1.3rem' },
    normal: { label:'NORMAL', cls:'badge-normal', cols:6, fs:'1.4rem', bs:'1.1rem' },
    hard:   { label:'HARD',   cls:'badge-hard',   cols:8, fs:'1.1rem', bs:'0.9rem' },
  };

  let state = {};
  let currentPairs = 8;
  let currentDiff = 'easy';

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startGame(pairs, diff) {
    currentPairs = pairs;
    currentDiff = diff;
    const meta = DIFF_META[diff];
    const tag = document.getElementById('diff-tag');
    tag.textContent = meta.label;
    tag.className = 'diff-tag ' + meta.cls;
    showScreen('game-screen');
    initGame();
  }

  function initGame() {
    const meta = DIFF_META[currentDiff];
    const emojis = shuffle(ALL_EMOJIS).slice(0, currentPairs);
    state = { cards: shuffle([...emojis, ...emojis]), flipped: [], matched_ids: [], matched: 0, moves: 0, locked: false };
    document.getElementById('moves').textContent = '0';
    document.getElementById('pairs').textContent = '0 / ' + currentPairs;
    document.getElementById('msg').textContent = '';
    document.getElementById('grid').style.gridTemplateColumns = 'repeat(' + meta.cols + ', 1fr)';
    render();
  }

  function goTitle() { showScreen('title-screen'); }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function render() {
    const meta = DIFF_META[currentDiff];
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    state.cards.forEach((icon, i) => {
      const isMatched = state.matched_ids.includes(i);
      const isFlipped = state.flipped.includes(i);
      const card = document.createElement('div');
      card.className = 'card' + (isFlipped || isMatched ? ' flipped' : '') + (isMatched ? ' matched' : '');
      card.innerHTML = `
        <div class="card-face card-back"><span class="card-back-icon" style="font-size:${meta.bs}">🌲</span></div>
        <div class="card-face card-front" style="font-size:${meta.fs}">${icon}</div>`;
      if (!isMatched) card.onclick = () => flip(i);
      grid.appendChild(card);
    });
  }

  function flip(i) {
    if (state.locked || state.flipped.includes(i) || state.matched_ids.includes(i) || state.flipped.length === 2) return;
    state.flipped.push(i);
    render();
    if (state.flipped.length === 2) {
      state.moves++;
      document.getElementById('moves').textContent = state.moves;
      state.locked = true;
      const [a, b] = state.flipped;
      if (state.cards[a] === state.cards[b]) {
        state.matched_ids = [...state.matched_ids, a, b];
        state.matched++;
        document.getElementById('pairs').textContent = state.matched + ' / ' + currentPairs;
        state.flipped = [];
        state.locked = false;
        document.getElementById('msg').textContent = '✨ ペア発見！';
        render();
        if (state.matched === currentPairs) {
          setTimeout(() => {
            document.getElementById('msg').textContent = '🎉 クリア！ ' + state.moves + ' 回でコンプリート！';
          }, 400);
        }
      } else {
        document.getElementById('msg').textContent = '';
        setTimeout(() => { state.flipped = []; state.locked = false; render(); }, 900);
      }
    }
  }

  function createLeaves() {
    const container = document.getElementById('leaves');
    const icons = ['🍃','🌿','🍀','🌱'];
    for (let i = 0; i < 18; i++) {
      const leaf = document.createElement('div');
      leaf.className = 'leaf';
      leaf.textContent = icons[Math.floor(Math.random() * icons.length)];
      leaf.style.left = Math.random() * 100 + '%';
      leaf.style.animationDuration = (12 + Math.random() * 18) + 's';
      leaf.style.animationDelay = (Math.random() * 20) + 's';
      leaf.style.fontSize = (0.9 + Math.random() * 0.8) + 'rem';
      container.appendChild(leaf);
    }
  }

  createLeaves();
</script>
</body>
</html>
